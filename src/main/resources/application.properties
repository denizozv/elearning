spring.application.name=elearning

# ===== H2 Veritabani (FILE-BASED / KALICI) =====
# Veriler ./data/elearning.mv.db dosyasinda tutulur; uygulama kapaninca SILINMEZ.
spring.datasource.url=jdbc:h2:file:./data/elearning
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ===== H2 Console (gelistirme) =====
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
